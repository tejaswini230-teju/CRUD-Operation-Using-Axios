<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axios CRUD Operation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!--Bootstrap ICONS-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body class="bg-info">

<div class="container mt-5">

  <h2 class="text-center mb-4">CRUD Operations Using Axios</h2>

  <!-- ADD BUTTON -->
  <div class="text-end mb-3">
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#userModal">
      Add Student
    </button>
  </div>

  <!-- TABLE -->
  <div class="card shadow-sm">
    <div class="card-body">

      <div class="table-responsive">
        <table class="table table-striped text-center">
          <thead class="table-dark">
            <tr>
              <th>S.No</th>
              <th>Stu.Name</th>
              <th>Stu.Age</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="userTable"></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="modal fade" id="userModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-danger-subtle">

      <div class="modal-header">
        <h5 class="modal-title">Add Student</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="userId">
        <form id="userForm">
        <label for="text">Enter Name:</label>
        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name" required>  

        <label for="number">Enter Your Age:</label>
        <input type="number" id="age" class="form-control" placeholder="Enter Age" required>
        </form>
      </div>

      <div class="modal-footer justify-content-center">
        <button class="btn btn-secondary me-2" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-success" onclick="saveUser()">Save</button>
      </div>

    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal fade" id="viewModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Student Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="viewContent"></div>

    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content text-center p-3">

      <h5>Are you sure?</h5>

      <div class="mt-3">
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/JS/script.js"></script>

</body>
</html>
